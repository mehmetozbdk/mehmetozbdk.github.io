<!DOCTYPE html>
<html lang="tr">
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Bilka Enneagram - Akademik Enneagram Kişilik Analizi Testi">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0E9BB5">

  <!-- Fontlar: uygulama Plus Jakarta Sans + Instrument Serif kullanıyor.
       gstatic'e crossorigin preconnect ile bağlantı erkenden açılır, böylece
       google_fonts paketi font dosyalarını daha hızlı çeker. display=swap ile
       font yüklenene kadar metin görünür kalır (FOIT yerine FOUT). -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Instrument+Serif:ital@1&display=swap">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Instrument+Serif:ital@1&display=swap">

  <!-- İlk ekranda görünen kritik görseller eager yüklensin (LCP iyileştirmesi).
       Standart flutter build web çıktısında asset kökü assets/ olduğundan
       Dart'taki assets/images/... yolu assets/assets/images/... olarak servis edilir. -->
  <link rel="preload" as="image" href="assets/assets/images/hero-main.webp" type="image/webp">
  <link rel="preload" as="image" href="assets/assets/images/logo-256.webp" type="image/webp">

  <title>Bilka Enneagram — Kişilik Analizi</title>
  <style>
    body {
      margin: 0;
      background-color: #F6FBFC;
      overflow: hidden;
    }
    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #F6FBFC;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      flex-direction: column;
      gap: 18px;
      transition: opacity 0.35s ease;
    }
    .loading-mark {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      overflow: hidden;
      background: linear-gradient(135deg, #0E9BB5, #0A6377);
      box-shadow: 0 12px 30px -10px rgba(8, 80, 75, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .loading-mark img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .loading-logo {
      font-size: 26px;
      font-weight: 800;
      color: #0F2B30;
      letter-spacing: -0.5px;
    }
    .loading-logo span {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-weight: 400;
      color: #0E9BB5;
    }
    .loading-bar {
      width: 56px;
      height: 3px;
      background: #0E9BB5;
      border-radius: 3px;
      animation: pulse 1.1s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.25; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loading-mark">
      <img src="assets/assets/images/logo-256.webp" alt="Bilka Enneagram" width="64" height="64">
    </div>
    <div class="loading-logo">Bilka <span>Enneagram</span></div>
    <div class="loading-bar"></div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('loading');
      if (!loading) return;
      loading.style.opacity = '0';
      setTimeout(function() { loading.style.display = 'none'; }, 350);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
